# Raw data snapshot manifest (the data-layer instance of the determinism
# invariant, inherited from pit-backtest). Every raw exchange snapshot the
# study consumes is recorded here with its source URL, the UTC fetch date, and
# the SHA256 of the on-disk bytes, so a reviewer can re-fetch and verify they
# have byte-identical inputs before regenerating any derived artifact. Raw
# bytes are gitignored; this manifest and the derived artifacts are committed.
#
# Two snapshot kinds with different reproducibility models:
#   - IMMUTABLE vendor dumps (Binance Vision): the bytes are gitignored, the
#     SHA256 + the vendor's published_checksum are committed, and a reviewer
#     re-fetches and verifies byte-identity. relpath is under the gitignored raw
#     root (data/raw).
#   - LIVE / as-of sources with no published checksum (Deribit DVOL): a re-fetch
#     is not guaranteed byte-identical, so the exact daily closes used are
#     COMMITTED as a small CSV fixture (kind = "reproducibility_fixture") whose
#     SHA256 makes the committed anchor tamper-evident. relpath is the committed
#     fixture (under tests/data); raw_root is the repo root. The committed spot
#     close fixture is recorded the same way so the headline reproduces offline.
#
# Read/written by src/riskpremia/data/manifest.py (load_manifest / upsert_entries
# / verify_snapshot). The VRP fixtures + their SHA256 are written by
# scripts/build_vrp_artifact.py (ADR 0004 PR5b). Schema (per entry, matching
# SnapshotEntry), one TOML array-of-tables block each:
#
#   name               the unique entry key (sorted on)
#   venue              binance_vision | okx | deribit
#   instrument         e.g. BTCUSDT
#   kind               funding_rate | klines | spot | reproducibility_fixture
#   relpath            path under raw_root (gitignored raw root, or the repo root
#                      for a committed reproducibility_fixture)
#   source_url         where the bytes were fetched from
#   fetched_utc        the UTC fetch instant (a TOML datetime)
#   sha256             our SHA256 over the on-disk bytes
#   size_bytes         the on-disk byte size
#   rows               optional, the parsed record count
#   published_checksum optional, the vendor's own SHA256 (immutable dumps only)
#   note               optional, free-text provenance (reproducibility_fixture)

